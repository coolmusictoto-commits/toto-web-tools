<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简约计算器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-light: #6b7280;
      --btn-bg: #f3f4f6;
      --btn-hover: #e5e7eb;
      --btn-active: #d1d5db;
      --operator-bg: #3b82f6;
      --operator-hover: #2563eb;
      --operator-active: #1d4ed8;
      --operator-text: #ffffff;
      --equal-bg: #10b981;
      --equal-hover: #059669;
      --equal-active: #047857;
      --clear-bg: #ef4444;
      --clear-hover: #dc2626;
      --clear-active: #b91c1c;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      --radius: 24px;
    }

    body.dark {
      --bg: #111827;
      --card-bg: #1f2937;
      --text: #f9fafb;
      --text-light: #9ca3af;
      --btn-bg: #374151;
      --btn-hover: #4b5563;
      --btn-active: #6b7280;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      transition: background 0.3s ease;
      padding: 20px;
    }

    .calculator {
      width: 100%;
      max-width: 360px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 1px;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: var(--btn-hover);
      transform: rotate(20deg);
    }

    .display {
      background: var(--btn-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: background 0.3s ease;
    }

    .history {
      font-size: 14px;
      color: var(--text-light);
      min-height: 20px;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .result {
      font-size: 42px;
      font-weight: 300;
      color: var(--text);
      word-break: break-all;
      line-height: 1.2;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      height: 64px;
      font-size: 22px;
      font-weight: 500;
      cursor: pointer;
      background: var(--btn-bg);
      color: var(--text);
      transition: all 0.15s ease;
      user-select: none;
    }

    button:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    button:active {
      background: var(--btn-active);
      transform: translateY(0);
    }

    button.operator {
      background: var(--operator-bg);
      color: var(--operator-text);
    }

    button.operator:hover {
      background: var(--operator-hover);
    }

    button.operator:active {
      background: var(--operator-active);
    }

    button.equal {
      background: var(--equal-bg);
      color: #ffffff;
      grid-column: span 2;
    }

    button.equal:hover {
      background: var(--equal-hover);
    }

    button.equal:active {
      background: var(--equal-active);
    }

    button.clear {
      background: var(--clear-bg);
      color: #ffffff;
    }

    button.clear:hover {
      background: var(--clear-hover);
    }

    button.clear:active {
      background: var(--clear-active);
    }

    button.zero {
      grid-column: span 2;
    }

    .hint {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-light);
    }

    @media (max-width: 400px) {
      .calculator {
        padding: 18px;
      }
      button {
        height: 56px;
        font-size: 20px;
        border-radius: 14px;
      }
      .result {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="header">
      <div class="title">CALCULATOR</div>
      <button class="theme-toggle" id="themeBtn" title="切换主题">☀</button>
    </div>

    <div class="display">
      <div class="history" id="history"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="clear" data-action="clear">AC</button>
      <button data-action="delete">⌫</button>
      <button data-action="percent">%</button>
      <button class="operator" data-action="operator" data-value="/">÷</button>

      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button class="operator" data-action="operator" data-value="*">×</button>

      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button class="operator" data-action="operator" data-value="-">−</button>

      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button class="operator" data-action="operator" data-value="+">+</button>

      <button data-number class="zero">0</button>
      <button data-number>.</button>
      <button class="equal" data-action="calculate">=</button>
    </div>

    <div class="hint">支持键盘输入 · Enter 计算 · Esc 清空</div>
  </div>

  <script>
    const resultEl = document.getElementById('result');
    const historyEl = document.getElementById('history');
    const themeBtn = document.getElementById('themeBtn');

    let current = '0';
    let previous = '';
    let operator = null;
    let shouldResetScreen = false;

    function updateDisplay() {
      resultEl.textContent = current;
      historyEl.textContent = previous + (operator ? ' ' + getOperatorSymbol(operator) : '');
    }

    function getOperatorSymbol(op) {
      const map = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      return map[op] || op;
    }

    function appendNumber(number) {
      if (current === '0' || shouldResetScreen) {
        current = number === '.' ? '0.' : number;
        shouldResetScreen = false;
      } else {
        if (number === '.' && current.includes('.')) return;
        current += number;
      }
      updateDisplay();
    }

    function deleteNumber() {
      if (current.length === 1 || (current.length === 2 && current[0] === '-')) {
        current = '0';
      } else {
        current = current.slice(0, -1);
      }
      updateDisplay();
    }

    function clear() {
      current = '0';
      previous = '';
      operator = null;
      shouldResetScreen = false;
      updateDisplay();
    }

    function chooseOperator(op) {
      if (operator !== null && !shouldResetScreen) {
        calculate();
      }
      previous = current;
      operator = op;
      shouldResetScreen = true;
      updateDisplay();
    }

    function calculate() {
      if (operator === null || previous === '') return;
      let computation;
      const prev = parseFloat(previous);
      const curr = parseFloat(current);
      if (isNaN(prev) || isNaN(curr)) return;

      switch (operator) {
        case '+': computation = prev + curr; break;
        case '-': computation = prev - curr; break;
        case '*': computation = prev * curr; break;
        case '/':
          if (curr === 0) {
            current = '不能除以 0';
            previous = '';
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
            return;
          }
          computation = prev / curr;
          break;
      }

      current = formatNumber(computation);
      previous = '';
      operator = null;
      shouldResetScreen = true;
      updateDisplay();
    }

    function formatNumber(num) {
      if (!isFinite(num)) return '错误';
      const str = parseFloat(num.toPrecision(12)).toString();
      return str;
    }

    function percent() {
      const value = parseFloat(current);
      if (isNaN(value)) return;
      current = formatNumber(value / 100);
      updateDisplay();
    }

    document.querySelectorAll('[data-number]').forEach(btn => {
      btn.addEventListener('click', () => appendNumber(btn.textContent));
    });

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        switch (action) {
          case 'clear': clear(); break;
          case 'delete': deleteNumber(); break;
          case 'operator': chooseOperator(btn.dataset.value); break;
          case 'calculate': calculate(); break;
          case 'percent': percent(); break;
        }
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
      if (e.key === '.') appendNumber('.');
      if (e.key === '+') chooseOperator('+');
      if (e.key === '-') chooseOperator('-');
      if (e.key === '*') chooseOperator('*');
      if (e.key === '/') { e.preventDefault(); chooseOperator('/'); }
      if (e.key === 'Enter' || e.key === '=') calculate();
      if (e.key === 'Backspace') deleteNumber();
      if (e.key === 'Escape') clear();
      if (e.key === '%') percent();
    });

    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      themeBtn.textContent = document.body.classList.contains('dark') ? '☾' : '☀';
    });

    updateDisplay();
  </script>
</body>
</html>
